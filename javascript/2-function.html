<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //a function is a block of code designed to execute specific tasks,
        //facilitaing program encapsulation and reusability.
        function add(a,b){
            return a + b;
        }

        let result = add(10,20);
        console.log(result);

        //匿名函数的两种表达方式
        let subtract = function(a,b){
            return a - b;
        }
        let result_1 = subtract(100,1);
        console.log(result_1);

        let multiply = (a,b) =>{
            return a*b;
        }
        result_2 = multiply(12,12);
        console.log(result_2);
    </script>
</body>
</html>
